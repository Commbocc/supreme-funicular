name: Check Deploy Preview URLs

on:
  status:

jobs:
  check-urls:
    # Filter to Netlify deploy-preview statuses only
    if: |
      github.event.state == 'success' &&
      contains(github.event.context, 'netlify') &&
      contains(github.event.context, 'deploy-preview')

    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      # - name: debug
      #   run: |
      #     echo '${{ toJson(github.event) }}'

      # - name: Check URLs return 200
      #   run: |
      #     BASE_URL="${{ github.event.target_url }}"

      #     PATHS=(
      #       "/"
      #       "/welcome"
      #       "/api/test"
      #       "/404"
      #     )

      #     FAILED=0
      #     for path in "${PATHS[@]}"; do
      #       URL="${BASE_URL}${path}"
      #       STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$URL")
      #       if [ "$STATUS" = "200" ]; then
      #         echo "✅ $URL → $STATUS"
      #       else
      #         echo "❌ $URL → $STATUS"
      #         FAILED=1
      #       fi
      #     done

      #     exit $FAILED

      - name: Check URLs and comment on PR
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_URL: ${{ github.event.target_url }}
        run: |
          PR_NUMBER=$(gh api /repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[0].number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open PR found, skipping."
            exit 0
          fi

          # Format: "path:expected_status"
          CHECKS=(
            "/"
            "/welcome"
            "/api/test"
            "/404:404"
          )

          FAILED=0
          BODY="**Deploy Preview URL Checks**"$'\n'

          for check in "${CHECKS[@]}"; do
            URL_PATH="${check%%:*}"
            EXPECTED="${check##*:}"
            # Default to 200 if no expected status was supplied
            [ "$EXPECTED" = "$URL_PATH" ] && EXPECTED="200"
            URL="${BASE_URL}${URL_PATH}"
            ACTUAL=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$URL")
            if [ "$ACTUAL" = "$EXPECTED" ]; then
              BODY+="✅ \`${URL}\` → ${ACTUAL}"$'\n'
            else
              BODY+="❌ \`${URL}\` → ${ACTUAL} (expected ${EXPECTED})"$'\n'
              FAILED=1
            fi
          done

          echo "$BODY"

          gh pr comment "$PR_NUMBER" --repo ${{ github.repository }} --body "$BODY"

          exit $FAILED
